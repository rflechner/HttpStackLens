<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HttpStackLens — light / dark</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg0: 'var(--bg0)', bg1: 'var(--panel)', bg2: 'var(--bg2)', bg3: 'var(--bg3)',
          line: 'var(--line)', lineSoft: 'var(--lineSoft)',
          ink: 'var(--ink)', dim: 'var(--dim)', faint: 'var(--faint)',
          mint: 'var(--mint)', warn: 'var(--warn)', danger: 'var(--danger)', info: 'var(--info)', pink: 'var(--pink)',
        },
        fontFamily: {
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          ui: ['Inter', 'system-ui', 'sans-serif'],
        },
      },
    },
  };
</script>
<style>
  :root, [data-theme="light"] {
    --desk:#e9e5de; --panel:#ffffff; --sidebar:#faf8f4;
    --bg0:#f1eee8; --bg2:#f6f3ee; --bg3:#eae5db;
    --line:#e5e0d6; --lineSoft:#efebe3;
    --ink:#2b2926; --dim:#6f6b62; --faint:#a49f94;
    --mint:#2f9e8f; --warn:#c98a2b; --danger:#d1584f; --info:#4a7fc4; --pink:#9a6cc9; --success:#3f9d6b;
    --pill-bg:#ffffff; --pill-border:#e5e0d6; --pill-shadow:0 1px 2px rgba(0,0,0,.04);
    --scroll-thumb:#d8d2c6; --scroll-thumb-hover:#c7c0b2;
    --brand-shadow:0 2px 6px #2f9e8f40;
    --kbd-bg:#ece7dd;
  }
  [data-theme="dark"] {
    --desk:#0a0b0d; --panel:#15171c; --sidebar:#15171c;
    --bg0:#0e0f12; --bg2:#1c1f26; --bg3:#23272f;
    --line:#262a33; --lineSoft:#1f232a;
    --ink:#d8dce4; --dim:#8a93a3; --faint:#5a6173;
    --mint:#7fd4b4; --warn:#f1b45a; --danger:#e86a6a; --info:#7aa7ff; --pink:#d48ad6; --success:#7fd4b4;
    --pill-bg:#23272f; --pill-border:#2b303a; --pill-shadow:none;
    --scroll-thumb:#23272f; --scroll-thumb-hover:#2f343d;
    --brand-shadow:0 2px 8px #2f9e8f55;
    --kbd-bg:#23272f;
  }
  html, body { margin: 0; height: 100%; background: var(--desk); overflow: hidden; }
  body { font-family: Inter, system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }

  .rec-dot { width: 8px; height: 8px; border-radius: 4px; flex-shrink: 0; background: var(--faint); display: inline-block; }
  .rec-dot.on { background: var(--danger); animation: hsl-pulse 1.6s ease-out infinite; }
  @keyframes hsl-pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--danger) 55%, transparent); } 100% { box-shadow: 0 0 0 9px color-mix(in srgb, var(--danger) 0%, transparent); } }

  @keyframes hsl-row-in { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }
  .row-new { animation: hsl-row-in .45s ease-out; }
  #list [data-row]:hover { background: var(--bg2) !important; }

  .spin { animation: hsl-spin 1s linear infinite; }
  @keyframes hsl-spin { to { transform: rotate(360deg); } }

  .hsl-scroll::-webkit-scrollbar { width: 11px; height: 11px; }
  .hsl-scroll::-webkit-scrollbar-track { background: transparent; }
  .hsl-scroll::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
  .hsl-scroll::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); background-clip: padding-box; border: 3px solid transparent; }

  .hsl-tb { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 11px; border-radius: 7px;
    font-size: 12.5px; font-family: Inter; font-weight: 500; color: var(--dim); background: transparent;
    border: 1px solid transparent; cursor: pointer; white-space: nowrap; user-select: none; transition: background .12s, color .12s; }
  .hsl-tb:hover { background: var(--bg3); color: var(--ink); }
  .hsl-btn { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 12px; border-radius: 7px;
    font-size: 12.5px; font-family: Inter; font-weight: 500; color: var(--dim); background: var(--bg2);
    border: 1px solid var(--line); cursor: pointer; white-space: nowrap; transition: background .12s, color .12s; }
  .hsl-btn:hover { color: var(--ink); background: var(--bg3); }
  a { color: var(--mint); }
  a:hover { opacity: .8; }
  input::placeholder { color: var(--faint); }
  input:focus, select:focus { outline: none; }
  .theme-toggle { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:9px;
    border:1px solid var(--line); background:var(--bg2); color:var(--dim); cursor:pointer; transition:background .12s, color .12s; }
  .theme-toggle:hover { background:var(--bg3); color:var(--ink); }
</style>
</head>
<body>

<!-- Page loader -->
<div id="loader">
  <div class="loader-spinner"></div>
  <span class="text-dim text-xs">Loading WASM…</span>
</div>

<div class="flex flex-col h-screen w-screen overflow-hidden bg-bg0">

  <!-- title bar -->
  <div class="flex items-center gap-[10px] flex-shrink-0" style="height:52px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--line)">
    <div class="flex items-center gap-[10px] text-ink">
      <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(150deg,#37b0a0,#2f9e8f);display:flex;align-items:center;justify-content:center;box-shadow:var(--brand-shadow)">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="#ffffff" stroke-width="1.4"></circle>
          <circle cx="7" cy="7" r="1.9" fill="#ffffff"></circle>
        </svg>
      </div>
      <div class="flex flex-col" style="line-height:1.15">
        <span class="font-bold" style="font-size:15px;letter-spacing:-.2px">HttpStackLens</span>
        <span class="text-faint" style="font-size:11px">Local session</span>
      </div>
    </div>
    <div class="flex-1"></div>
    <div class="flex items-center gap-[3px]" style="background:var(--bg0);border:1px solid var(--line);border-radius:9px;padding:3px;margin-right:4px">
      <span class="text-faint" style="font-size:11px;padding:0 6px 0 8px;font-weight:500">Density</span>
      <button data-density="compact" class="hsl-density" style="height:24px;padding:0 10px;border-radius:6px;font-size:11.5px;font-family:Inter;font-weight:500;cursor:pointer;background:transparent;color:var(--dim);border:none">Compact</button>
      <button data-density="normal" class="hsl-density" style="height:24px;padding:0 10px;border-radius:6px;font-size:11.5px;font-family:Inter;font-weight:600;cursor:pointer;background:var(--pill-bg);color:var(--mint);border:1px solid var(--pill-border);box-shadow:var(--pill-shadow)">Normal</button>
      <button data-density="comfy" class="hsl-density" style="height:24px;padding:0 10px;border-radius:6px;font-size:11.5px;font-family:Inter;font-weight:500;cursor:pointer;background:transparent;color:var(--dim);border:none">Comfy</button>
    </div>
    <button id="btn-theme" class="theme-toggle" data-action="toggle-theme" title="Toggle theme"></button>
    <button class="hsl-tb" data-action="open-settings">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.3v2M8 12.7v2M14.7 8h-2M3.3 8h-2M12.8 3.2l-1.4 1.4M4.6 11.4l-1.4 1.4M12.8 12.8l-1.4-1.4M4.6 4.6L3.2 3.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Settings
    </button>
  </div>

  <!-- toolbar -->
  <div class="flex items-center gap-2 flex-shrink-0" style="height:52px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--line)">
    <button id="btn-capture" class="hsl-tb" data-action="toggle-capture"></button>
    <button class="hsl-tb" data-action="clear">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 3.8h9M5.2 3.8V2.6h3.6v1.2M4 3.8l.4 7.2h5.2l.4-7.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Clear
    </button>
    <div style="width:1px;height:22px;background:var(--line);margin:0 4px"></div>
    <button id="btn-decrypt" class="hsl-tb" data-action="toggle-decrypt"></button>
    <button id="btn-upstream" class="hsl-tb" data-action="open-upstream"></button>
    <button id="btn-access" class="hsl-tb" data-action="open-access"></button>
    <div class="flex-1"></div>
    <div class="flex items-center gap-[8px]" style="background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:0 12px;height:34px;width:340px">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><circle cx="7" cy="7" r="4.5" stroke="var(--faint)" stroke-width="1.4"/><path d="M10.5 10.5l3 3" stroke="var(--faint)" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input id="filter" placeholder="Search host, path, method, status…" class="flex-1 bg-transparent border-0 outline-none text-ink" style="font-size:13px;font-family:Inter" />
      <button id="filter-clear" class="text-faint" style="background:none;border:none;cursor:pointer;font-size:15px;padding:0;line-height:1">×</button>
      <span class="text-faint" style="font-family:'JetBrains Mono';font-size:10.5px;background:var(--kbd-bg);border-radius:4px;padding:2px 5px">⌘K</span>
    </div>
  </div>

  <!-- body -->
  <div class="flex flex-1 min-h-0">

    <!-- sidebar -->
    <div class="flex flex-col flex-shrink-0" style="width:232px;background:var(--sidebar);border-right:1px solid var(--line)">
      <div style="padding:16px 10px 4px">
        <div class="text-faint" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;padding:0 10px 8px">Session</div>
        <div class="grid gap-[2px]">
          <button data-side="all" class="flex items-center gap-[10px] w-full text-left rounded-[8px]" style="padding:8px 10px;border:none;cursor:pointer;font-family:Inter;font-size:13px;font-weight:500"><span style="width:8px;height:8px;border-radius:4px;background:var(--faint)"></span><span class="flex-1">All traffic</span><span class="side-count text-faint" style="font-size:11.5px;font-weight:500">0</span></button>
          <button data-side="2xx" class="flex items-center gap-[10px] w-full text-left rounded-[8px]" style="padding:8px 10px;border:none;cursor:pointer;font-family:Inter;font-size:13px;font-weight:500;color:var(--dim)"><span style="width:8px;height:8px;border-radius:4px;background:var(--success)"></span><span class="flex-1">Success</span><span class="side-count text-faint" style="font-size:11.5px;font-weight:500">0</span></button>
          <button data-side="4xx" class="flex items-center gap-[10px] w-full text-left rounded-[8px]" style="padding:8px 10px;border:none;cursor:pointer;font-family:Inter;font-size:13px;font-weight:500;color:var(--dim)"><span style="width:8px;height:8px;border-radius:4px;background:var(--warn)"></span><span class="flex-1">Client errors</span><span class="side-count text-faint" style="font-size:11.5px;font-weight:500">0</span></button>
          <button data-side="5xx" class="flex items-center gap-[10px] w-full text-left rounded-[8px]" style="padding:8px 10px;border:none;cursor:pointer;font-family:Inter;font-size:13px;font-weight:500;color:var(--dim)"><span style="width:8px;height:8px;border-radius:4px;background:var(--danger)"></span><span class="flex-1">Server errors</span><span class="side-count text-faint" style="font-size:11.5px;font-weight:500">0</span></button>
          <button data-side="tls" class="flex items-center gap-[10px] w-full text-left rounded-[8px]" style="padding:8px 10px;border:none;cursor:pointer;font-family:Inter;font-size:13px;font-weight:500;color:var(--dim)"><span style="width:8px;height:8px;border-radius:4px;background:var(--mint)"></span><span class="flex-1">Secure (TLS)</span><span class="side-count text-faint" style="font-size:11.5px;font-weight:500">0</span></button>
        </div>
      </div>
      <div style="padding:16px 10px 4px">
        <div class="text-faint" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;padding:0 10px 8px">Hosts</div>
        <div id="hosts" class="grid gap-[2px]"></div>
      </div>
      <div class="flex-1"></div>
      <div style="padding:14px 16px;border-top:1px solid var(--line);background:var(--bg2)">
        <div class="flex items-center gap-[7px]" style="margin-bottom:8px">
          <span style="width:7px;height:7px;border-radius:4px;background:var(--success);box-shadow:0 0 0 3px color-mix(in srgb, var(--success) 22%, transparent)"></span>
          <span class="text-dim" style="font-size:11.5px;font-weight:600">Listening</span>
        </div>
        <div style="font-family:'JetBrains Mono';font-size:12px;color:var(--ink)"><span style="color:var(--mint)">127.0.0.1</span>:<span style="color:var(--warn)">8823</span></div>
        <div class="flex gap-4" style="margin-top:10px;font-size:11.5px;color:var(--dim)">
          <span class="inline-flex items-center gap-[4px]"><span style="color:var(--success)">↓</span> 1.42<span class="text-faint"> MB/s</span></span>
          <span class="inline-flex items-center gap-[4px]"><span style="color:var(--info)">↑</span> 284<span class="text-faint"> KB/s</span></span>
        </div>
      </div>
    </div>

    <!-- content -->
    <div class="flex flex-col flex-1 min-w-0" style="background:var(--bg0)">
      <!-- waterfall -->
      <div id="waterfall" class="flex items-end gap-[2px] flex-shrink-0 overflow-hidden" style="height:52px;background:var(--panel);border-bottom:1px solid var(--line);padding:8px 16px"></div>

      <!-- list region -->
      <div id="list-region" class="flex flex-col min-h-0" style="flex:1">
        <!-- column header -->
        <div class="grid items-center flex-shrink-0" style="grid-template-columns:44px 60px 22px 66px 190px 1fr 140px 74px 84px 58px;gap:12px;padding:0 16px;height:34px;background:var(--sidebar);border-bottom:1px solid var(--line);border-left:3px solid transparent">
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;text-align:right">#</span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase">Method</span>
          <span></span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase">Status</span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase">Host</span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase">Path</span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase">Type</span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;text-align:right">Size</span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;text-align:right">Time</span>
          <span class="text-faint" style="font-family:Inter;font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;text-align:right">Dur</span>
        </div>
        <!-- list -->
        <div id="list" class="flex-1 min-h-0 overflow-auto hsl-scroll" style="background:var(--panel)"></div>
      </div>

      <!-- detail -->
      <div id="detail-wrap" class="flex flex-col min-h-0" style="flex:0.45;border-top:1px solid var(--line);background:var(--panel);display:none"></div>
    </div>
  </div>

  <!-- status bar -->
  <div id="statusbar" class="flex items-center flex-shrink-0" style="height:30px;background:var(--panel);border-top:1px solid var(--line);font-family:Inter;font-size:11.5px;color:var(--dim)"></div>
</div>

<!-- modal layer -->
<div id="modal-root" style="position:fixed;inset:0;pointer-events:none;z-index:50"></div>

<script src="ui.js"></script>
<script src="js/wasm_exec.js"></script>

<script>
  // ── Clear ───────────────────────────────────────────────────────────
  function clearRequests() {
    document.getElementById('request-rows').innerHTML = '';
    document.getElementById('request-count').textContent = '0 requests';
    if (window.wasmClear) window.wasmClear();
  }

  // ── WASM ────────────────────────────────────────────────────────────
  const go = new Go();
  WebAssembly.instantiateStreaming(fetch('wasm/app.wasm'), go.importObject)
          .then(result => {
            go.run(result.instance);
            const loader = document.getElementById('loader');
            loader.hidden = true;
          });
</script>

</body>
</html>

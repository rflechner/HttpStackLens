proxy:
  enable_remote_connection: false
  port: 3128
  output_proxy_uri: # "http://localhost:3130" #http://localhost:3129
  add_windows_authentication_to_output_proxy: false #true # only for windows
  require_windows_authentication: true # only for windows

webui:
  port: 9000
  enable_remote_connection: false

logging:
  level: info # debug | info | warn | error (overridden by --verbose)
  file: logs/httpStackLens.log # empty to disable the file sink

cert_manager:
  ca_cert_file: "certificates/debug-https-ca.crt"
  ca_key_file: "certificates/debug-https-ca.key"
  domain_certs_folder: "certificates/domains"

storage:
  enable: true
  folder: "captures"

capture:
  decrypt_https: true # intercept & decrypt HTTPS (generates + installs a per-domain cert)
  mime_types:
    - name: "image/*"
      max_size_mb: 2.5
    - name: "text/*"
      max_size_kb: 10000
    - name: "application/json"

